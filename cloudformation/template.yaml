AWSTemplateFormatVersion: '2010-09-09'
Description: Template basico para proyecto DevOps Cine Seat Booking App

Resources:
  DevOpsS3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub devops-cine-logs-${AWS::AccountId}

  DevOpsSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security Group for Cine Seat Booking App
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 3000
          ToPort: 3000
          CidrIp: 0.0.0.0/0

      # In production, Security Groups should restrict access as much as possible.
      # Port 22 should ideally be limited to trusted IPs only.
      # Port 8080 is used for frontend access.
      # Port 3000 may be used for backend/API testing.
      # Avoid using 0.0.0.0/0 broadly in production environments.

      VpcId: vpc-xxxxxxxx

  DevOpsEC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: ami-xxxxxxxx
      InstanceType: t2.micro
      SecurityGroupIds:
        - !Ref DevOpsSecurityGroup
      Tags:
        - Key: Name
          Value: devops-cine-app

Outputs:
  BucketName:
    Description: Nombre del bucket S3
    Value: !Ref DevOpsS3Bucket

  InstanceId:
    Description: ID de la instancia EC2
    Value: !Ref DevOpsEC2Instance