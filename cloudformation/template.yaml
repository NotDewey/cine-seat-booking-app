AWSTemplateFormatVersion: '2010-09-09'
Description: Template basico para proyecto DevOps Cine Seat Booking App

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC donde se creara el Security Group

  AmiId:
    Type: AWS::EC2::Image::Id
    Description: AMI de la instancia EC2

  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: Nombre del key pair existente

Resources:
  DevOpsS3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub devops-cine-logs-${AWS::AccountId}-${AWS::Region}

  DevOpsSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security Group for Cine Seat Booking App
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 3000
          ToPort: 3000
          CidrIp: 0.0.0.0/0

  DevOpsEC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref AmiId
      InstanceType: t2.micro
      KeyName: !Ref KeyName
      SecurityGroupIds:
        - !Ref DevOpsSecurityGroup
      Tags:
        - Key: Name
          Value: devops-cine-app

Outputs:
  BucketName:
    Description: Nombre del bucket S3
    Value: !Ref DevOpsS3Bucket

  InstanceId:
    Description: ID de la instancia EC2
    Value: !Ref DevOpsEC2Instance
